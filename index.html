<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qTOUGH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07070c;
  --card: rgba(255,255,255,0.04);
  --stroke: rgba(255,255,255,0.08);
  --text:#fff;
  --muted:#8a8a8a;
  --accent:#ff0055;
}

*{box-sizing:border-box}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,85,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(122,44,255,0.12), transparent 45%);
  z-index: -1;
}

.card {
  width: 100%;
  max-width: 520px;
  text-align: center;
  padding: 34px 22px;
}

h1 {
  font-size: 38px;
  margin: 0;
  background: linear-gradient(90deg, #fff, #aaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  margin-top: 8px;
  color: var(--muted);
  font-size: 13px;
}

/* STREAM */
.stream {
  margin-top: 22px;
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(255,0,85,0.08);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* buttons */
.links {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

a { text-decoration: none; }

.btn {
  padding: 14px;
  border-radius: 14px;
  background: var(--card);
  border: 1px solid var(--stroke);
  color: var(--text);
  transition: 0.25s;
}

.btn:hover {
  transform: translateY(-3px);
  border-color: rgba(255,0,85,0.4);
}

.primary {
  background: rgba(255,0,85,0.15);
  border: 1px solid rgba(255,0,85,0.35);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <h1>qTOUGH</h1>
  <div class="subtitle">Live Stream Hub</div>

  <!-- 🔴 YOUR YOUTUBE LIVE STREAM -->
  <div class="stream">
    <iframe
      src="https://www.youtube.com/embed/F5EKjldpBno"
      allowfullscreen>
    </iframe>
  </div>

  <div class="links">

    <a class="btn primary" href="https://t.me/ToughL2" target="_blank">
      Телеграм канал
    </a>

    <a class="btn" href="https://www.youtube.com/@ToughW8" target="_blank">
      YouTube Channel
    </a>

    <a class="btn" href="https://www.tiktok.com/@qtough" target="_blank">
      TikTok
    </a>

    <a class="btn" href="https://bohpts.com/register?ref=Tough" target="_blank">
      BoHpts Referal Link
    </a>

  </div>

</div>

</body>
</html>
