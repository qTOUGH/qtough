<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qTOUGH Live</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0f;
  color: white;
}

/* header */
.header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

/* layout */
.wrapper {
  display: flex;
  gap: 12px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 10px;
}

/* stream */
.stream {
  flex: 2;
  aspect-ratio: 16/9;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #222;
}

.stream iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* chat */
.chat {
  flex: 1;
  min-width: 320px;
  height: 600px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #222;
}

.chat iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* mobile */
@media (max-width: 900px) {
  .wrapper {
    flex-direction: column;
  }
  .chat {
    height: 450px;
  }
}
</style>
</head>

<body>

<div class="header">qTOUGH • LIVE STREAM</div>

<div class="wrapper">

  <!-- STREAM -->
  <div class="stream">
    <iframe id="ytStream"
      src="https://www.youtube.com/embed/F5EKjldpBno"
      allowfullscreen>
    </iframe>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <iframe id="ytChat"
      src="https://www.youtube.com/live_chat?v=F5EKjldpBno&embed_domain=yourname.github.io">
    </iframe>
  </div>

</div>

</body>
</html>
