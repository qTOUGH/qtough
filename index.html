<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qTOUGH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0f;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* subtle glow background like premium landing pages */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,80,0.12), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,0,255,0.10), transparent 40%);
  z-index: -1;
}

/* main card */
.card {
  width: 100%;
  max-width: 420px;
  text-align: center;
  padding: 30px 22px;
}

/* title */
h1 {
  font-size: 34px;
  margin: 0;
  letter-spacing: 1px;
}

.subtitle {
  margin-top: 8px;
  color: #888;
  font-size: 13px;
}

/* buttons */
.links {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

a {
  text-decoration: none;
}

.btn {
  padding: 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #fff;
  font-weight: 500;
  transition: 0.2s;
  backdrop-filter: blur(10px);
}

.btn:hover {
  transform: translateY(-2px);
  border-color: rgba(255,0,80,0.5);
  box-shadow: 0 0 20px rgba(255,0,80,0.15);
}

/* primary button */
.primary {
  background: rgba(255,0,80,0.12);
  border: 1px solid rgba(255,0,80,0.35);
}

/* footer */
footer {
  margin-top: 22px;
  font-size: 11px;
  color: #555;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <h1>qTOUGH</h1>
  <div class="subtitle">Streamer Hub • Minimal Landing</div>

  <div class="links">

    <a class="btn primary" href="https://t.me/ToughL2" target="_blank">
      Telegram Channel
    </a>

    <a class="btn" href="https://www.youtube.com/@ToughW8" target="_blank">
      YouTube Channel
    </a>

    <a class="btn" href="https://www.tiktok.com/@qtough" target="_blank">
      TikTok
    </a>

    <a class="btn" href="https://bohpts.com/register?ref=Tough" target="_blank">
      BoHpts x7 Referral
    </a>

  </div>

  <footer>
    © 2026 qTOUGH
  </footer>

</div>

</body>
</html>
