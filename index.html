<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qTOUGH Live</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0f;
  color: white;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

.stream {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #222;
  box-shadow: 0 0 25px rgba(255,0,80,0.15);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.status {
  margin: 15px 0;
  font-size: 14px;
  color: #aaa;
}

.live {
  color: #ff3b3b;
  font-weight: bold;
}

.offline {
  color: #777;
}
</style>
</head>

<body>

<div class="container">

  <h1>qTOUGH</h1>
  <div class="status" id="status">Проверка стрима...</div>

  <div class="stream" id="player" style="display:none;">
    <iframe id="ytframe" allowfullscreen></iframe>
  </div>

</div>

<script>
const API_KEY = "YOUR_YOUTUBE_API_KEY";
const CHANNEL_ID = "UCxxxxxxxxxxxxxxxx"; // <-- нужно ID канала

async function checkLive() {
  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.items && data.items.length > 0) {
      const videoId = data.items[0].id.videoId;

      document.getElementById("status").innerHTML =
        "🔴 <span class='live'>LIVE NOW</span>";

      document.getElementById("player").style.display = "block";
      document.getElementById("ytframe").src =
        `https://www.youtube.com/embed/${videoId}`;
    } else {
      document.getElementById("status").innerHTML =
        "⚫ <span class='offline'>OFFLINE</span>";
    }

  } catch (e) {
    document.getElementById("status").innerText = "Ошибка загрузки стрима";
  }
}

checkLive();
</script>

</body>
</html>
