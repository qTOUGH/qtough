<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Page</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  text-align: center;
}

/* аватар */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #ff3d00;
  margin-top: 30px;
  box-shadow: 0 0 20px #ff3d00;
}

/* ник */
h1 {
  margin: 10px 0;
  font-size: 28px;
}

/* кнопки */
.btn {
  display: inline-block;
  margin: 8px;
  padding: 10px 18px;
  border-radius: 10px;
  background: #ff3d00;
  color: white;
  text-decoration: none;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
  background: #ff5722;
}

/* стрим */
.stream {
  width: 90%;
  max-width: 900px;
  margin: 30px auto;
  aspect-ratio: 16/9;
}

iframe {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  border: none;
  box-shadow: 0 0 30px rgba(255,61,0,0.4);
}
</style>
</head>

<body>

<img class="avatar" src="https://i.imgur.com/yourimage.png">

<h1>Your Name</h1>

<div>
  <a class="btn" href="https://twitch.tv/">Twitch</a>
  <a class="btn" href="https://discord.gg/">Discord</a>
  <a class="btn" href="https://youtube.com/">YouTube</a>
</div>

<div class="stream">
  <iframe
    src="https://player.twitch.tv/?channel=YOUR_CHANNEL&parent=localhost"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
